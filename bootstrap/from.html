<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <h1>Registration form !</h1>

    <div class="card p-5 bg-denger">
        <form action="">

            <label for="" class="form-label">Name</label>

            <input type="text" name="name" id="" class="form-control" placeholder="your name" />

            <label for="" class="form-label">Email</label>
            <input type="email" name="email" id="" class="form-control" placeholder="your @email.com " />

            <label for="">Mobile Number</label>
            <input type="number" name="mobile" id="" class="form-control" placeholder="your number" />

            <label for="" class="form-label">D.O.B</label>
            <input type="date" name="dob" id="" class="form-control" placeholder="dd/mm/yy" />

            <label for="">Gender: </label>
            <br />

            <input type="radio" name="gender" />
            <label for="">Male</label>

            <input type="radio" name="gender" />
            <label for="">Female</label>

            <input type="radio" name="gender" />
            <label for="">non</label>

            <br />
            <label for="" class="form-label">Upload Your Document : </label>
            <input type="file" name="document" id="" class="form-control" />
            <br>

            <select class="form-select" aria-label="Default select example">
                <option selected>Select your country</option>
                <option value="1">Usa</option>
                <option value="2">Russia</option>
                <option value="3">Iran</option>
                <option value="4">Iraq</option>
                <option value="5">India</option>
                <option value="6">china</option>
                <option value="7">mongolia</option>
                <option value="8">Nepal</option>
                <option value="9">myanmar</option>
                <option value="10">oman</option>
                <option value="11">yemen</option>
                <option value="12">sudan</option>
                <option value="13">Chad</option>
                <option value="14">DRC</option>
                <option value="15">Mali</option>
                <option value="16">Ghana</option>
                <option value="17">Spain</option>
                <option value="18">Japan</option>
                <option value="19">Namibia</option>
            </select>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                <label class="form-check-label" for="checkDefault"></label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="50" id="checkDefault">
                <label class="form-check-label" for="checkDefault"> </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="70" id="checkChecked" checked>
                <label class="form-check-label" for="checkChecked"></label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                <label class="form-check-label" for="checkChecked"></label>
            </div>

            <br>
            <center><button class="btn btn-primary">Submit</button></center>
        </form>
    </div>
    
</body>

</html>
